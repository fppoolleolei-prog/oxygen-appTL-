<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>酸素ボンベ計算ツール</title>

<style>
:root{
  --main:#1976d2;
  --safe:#2e7d32;
  --warn:#d64545;
  --card:#ffffff;
  --bg:#eef4fb;
}

*{box-sizing:border-box;}

body{margin:0;padding:20px;font-family:"Hiragino Sans","Yu Gothic",sans-serif;
     background:linear-gradient(180deg,#edf5ff,#dfeeff);color:#222;}

.container{max-width:620px;margin:auto;}

  .card{background:var(--card);border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,0.12);}

h1{margin-top:0;margin-bottom:20px;font-size:30px;text-align:center;color:var(--main);}

label{display:block;margin-top:18px;margin-bottom:6px;font-size:18px;font-weight:bold;}

input,
select{width:100%;padding:14px;border-radius:14px;border:1px solid #cfd8dc;font-size:18px;background:#fff;}

input:focus,
select:focus{outline:none;border-color:var(--main);box-shadow:0 0 0 4px rgba(25,118,210,0.15);}

.inputRow{display:flex;align-items:center;gap:12px;}

.inputRow input{flex:1;}

.pressureImg{width:130px;height:auto;}

.flowImg{width:auto;height:170px;}

.quickBtns{display:flex;gap:10px;margin-top:14px;}

.quickBtns button{flex:1;border:none;border-radius:14px;background:var(--main);
                  color:white;padding:14px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.2s;}

.quickBtns button:hover{transform:translateY(-2px);opacity:0.95;}

.calc{width:100%;margin-top:24px;padding:18px;border:none;border-radius:18px;
  background:#43a047;color:white;font-size:22px;font-weight:bold;cursor:pointer;transition:0.2s;}

.calc:hover{transform:translateY(-2px);opacity:0.95;}

.note{margin-top:10px;font-size:16px;color:#555;}

.small{font-size:13px;font-weight:normal;}

.result{margin-top:24px;padding:20px;border-radius:18px;background:#f5f9ff;
  border:2px solid #d7e7ff;text-align:center;}

.resultTime{font-size:38px;font-weight:bold;color:#0d47a1;}

.resultFlow{margin-top:10px;font-size:20px}

.warn{margin-top:16px;color:var(--warn);font-size:22px;font-weight:bold;}

.safe{margin-top:16px;color:var(--safe);font-size:22px;font-weight:bold;}

.footer{margin-top:20px;text-align:center;font-size:14px;color:#777;}

@media(max-width:600px){

  body{padding:12px;}

  .card{padding:18px;}

  h1{font-size:24px;}

  .inputRow{flex-direction:column;}

  .pressureImg,
  .flowImg{max-width:100%;height:auto;}

  .quickBtns{flex-direction:column;}
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>酸素ボンベ計算ツール</h1>

    <label>モード</label>

    <select id="mode">
      <option value="normal">通常酸素</option>
      <option value="nppv">NPPV（バイパップ）</option>
      <option value="vent">呼吸器</option>
    </select>

    <label>ボンベ圧（MPa）</label>

    <div class="inputRow">
      <input id="pressure" type="number" placeholder="例：10">
      <img src="oxygen/pressuregauge.png" alt="圧力計" class="pressureImg">
    </div>

    <div class="quickBtns">
      <button onclick="setPressureAndCalc(14.7)">
        14.7MPa<br>
        <span class="small">（満タン）</span>
      </button>

      <button onclick="setPressureAndCalc(10)">
        10MPa
      </button>

      <button onclick="setPressureAndCalc(5)">
        5MPa
      </button>
    </div>

    <div class="note">
      ※ 酸素ボンベの満タンは14.7MPaです
    </div>

    <!-- 通常酸素 -->
    <div id="normalFields">

      <label>流量（L/min）</label>

      <div class="inputRow">
        <input id="flow" type="number" placeholder="例：3">
        <img src="oxygen/flowmeter.png" alt="流量計" class="flowImg">
      </div>

    </div>

    <!-- NPPV -->
    <div id="nppvFields" style="display:none">

      <label>FiO2（%）</label>
      <input id="fio2" type="number" placeholder="例：60">

      <label>分時換気量（L/min）</label>
      <input id="totalFlow" type="number" placeholder="例：6">

      <label>リーク量（L/min）</label>
      <input id="leak" type="number" placeholder="未入力時は20">

    </div>

    <!-- 呼吸器 -->
    <div id="ventFields" style="display:none">

      <label>FiO2（%）</label>
      <input id="fio2_v" type="number" placeholder="例：60">

      <label>分時換気量（L/min）</label>
      <input id="mv_v" type="number" placeholder="例：8">

    </div>

    <button class="calc" onclick="calc()">
      計算する
    </button>

    <div id="result" class="result">
      計算結果がここに表示されます
    </div>

    <div class="footer">
      酸素管理サポートツール
    </div>

  </div>

</div>

<script>

const CYLINDER_TOTAL = 500;
const FULL_PRESSURE = 14.7;
const SAFE = 2;

const mode = document.getElementById("mode");

mode.addEventListener("change", () => {

  document.getElementById("normalFields").style.display =
    (mode.value === "normal") ? "block" : "none";

  document.getElementById("nppvFields").style.display =
    (mode.value === "nppv") ? "block" : "none";

  document.getElementById("ventFields").style.display =
    (mode.value === "vent") ? "block" : "none";

});

function setPressureAndCalc(value){

  document.getElementById("pressure").value = value;
  calc();

}

function getFlow(){

  // 通常酸素
  if(mode.value === "normal"){

    return parseFloat(
      document.getElementById("flow").value
    );

  }

  // NPPV
  if(mode.value === "nppv"){

    let fio2 =
      document.getElementById("fio2").value / 100;

    let mv =
      parseFloat(
        document.getElementById("totalFlow").value
      );

    let leakVal =
      document.getElementById("leak").value;

    let leak =
      leakVal === "" ? 20 : parseFloat(leakVal);

    return (mv + leak) *
      ((fio2 - 0.21) / 0.79);

  }

  // 呼吸器
  if(mode.value === "vent"){

    let fio2 =
      document.getElementById("fio2_v").value / 100;

    let mv =
      parseFloat(
        document.getElementById("mv_v").value
      );

    return Math.max(
      0,
      mv * ((fio2 - 0.21) / 0.79)
    );

  }
}

function calc(){

  let pressure =
    parseFloat(
      document.getElementById("pressure").value
    );

  let flow = getFlow();

  if(!pressure || pressure <= SAFE){

    alert("圧を確認してください");
    return;

  }

  if(!flow || flow <= 0){

    alert("設定を確認してください");
    return;

  }

  let usable =
    ((pressure - SAFE) / FULL_PRESSURE)
    * CYLINDER_TOTAL;

  let time = usable / flow;

  let status = "";

  if(time < 10){

    status =
      "<div class='warn'>⚠ 危険（10分未満）</div>";

  }
  else if(time < 20){

    status =
      "<div class='warn'>⚠ 注意（20分未満）</div>";

  }
  else{

    status =
      "<div class='safe'>✔ 使用可能</div>";

  }

  document.getElementById("result").innerHTML =
    `
    <div class="resultTime">
      残り ${Math.round(time)} 分
    </div>

    <div class="resultFlow">
      酸素消費 ${flow.toFixed(1)} L/min
    </div>

    ${status}
    `;
}

</script>

</body>
</html>
